<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자유게시판 | 김시우 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav id="navbar" style="position: sticky; top: 0; background: #fff;">
        <div class="nav-container">
            <h1 class="logo">SIWOO<span>.K</span></h1>
            <ul class="nav-links">
                <li><a href="index.html#home">HOME</a></li>
                <li><a href="index.html#technical-core">TECHNICAL CORE</a></li>
                <li><a href="index.html#data-analysis">DATA ANALYSIS</a></li>
                <li><a href="index.html#projects">PROJECTS</a></li>
                <li><a href="board.html">FREEBOARD</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-20" style="padding-top: 50px; min-height: 80vh;">
        <div class="board-header">
            <h2><i class="fas fa-clipboard-list"></i> 자유게시판 (Freeboard)</h2>
            <p class="text-gray">질문, 피드백 및 자유로운 소통 공간입니다.</p>
            <button class="btn btn-primary mt-10" onclick="openWriteModal()">글쓰기 <i class="fas fa-pen"></i></button>
        </div>

        <div class="board-list mt-20" id="board-container">
            <!-- Posts will be injected here via JS -->
        </div>
    </div>

    <!-- Edit/Write Modal -->
    <div id="boardModal" class="modal">
        <div class="modal-content card">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">새 글 작성</h3>
            <div class="form-group">
                <input type="text" id="post-author" placeholder="작성자 닉네임" required>
            </div>
            <div class="form-group">
                <input type="password" id="post-password" placeholder="비밀번호 (수정/삭제용)" required>
            </div>
            <div class="form-group">
                <textarea id="post-content" rows="4" placeholder="내용을 입력하세요..." required></textarea>
            </div>
            <input type="hidden" id="post-id">
            <button class="btn btn-primary w-100" id="save-btn" onclick="savePost()">저장하기</button>
        </div>
    </div>

    <!-- Password Prompt Modal for Edit/Delete -->
    <div id="pwdModal" class="modal">
        <div class="modal-content card" style="max-width: 400px;">
            <span class="close-btn" onclick="closePwdModal()">&times;</span>
            <h3>비밀번호 확인</h3>
            <p id="pwd-msg" class="text-gray small-text">해당 글을 관리하기 위해 비밀번호를 입력해주세요.</p>
            <div class="form-group mt-10">
                <input type="password" id="confirm-pwd" placeholder="비밀번호 입력">
            </div>
            <input type="hidden" id="pwd-action-type">
            <input type="hidden" id="pwd-post-id">
            <button class="btn btn-primary w-100 mt-10" onclick="verifyPassword()">확인</button>
        </div>
    </div>

    <footer>
        <div class="footer-content" style="padding: 20px;">
            <p>&copy; 2026 Siwoo Kim. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
